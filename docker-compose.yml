# dnsapi docker-compose example
#
# Architecture:
#   bind-primary   — Authoritative primary bind9 (master)
#   dnsapi-primary — dnsapi in primary mode; writes zone files and bind config
#                    to volumes shared with bind-primary, then reloads bind via rndc
#   bind-secondary — Secondary bind9 (slave)
#   dnsapi-secondary — dnsapi in secondary mode; receives zone/config sync from
#                      dnsapi-primary via HTTP and writes to volumes shared with
#                      bind-secondary, then reloads bind via rndc
#
# Before starting:
#   1. Copy bind9 named.conf files into the mounted config directories.
#      Both bind containers need a controls block that allows rndc from the
#      dnsapi container (see bind/named.conf.options.example below).
#   2. Set DNSAPI_API_TOKEN to a strong random value (same in both dnsapi services).
#   3. Adjust nameserver FQDNs in dnsapi-primary environment.
#
# named.conf.options snippet for rndc access from dnsapi container (add to both primary and secondary):
#   controls {
#       inet 0.0.0.0 port 953 allow { any; } keys { "rndc-key"; };
#   };
#
# The rndc key is auto-generated by bind9 on first start and stored in
# /etc/bind/rndc.key. Mount /etc/bind as a shared volume so dnsapi can
# use the same key when running rndc commands.


services:
  # ─── Primary bind9 ───────────────────────────────────────────────────────────
  bind-primary:
    image: ubuntu/bind9:latest
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        grep -q 'rndc.key' /etc/bind/named.conf 2>/dev/null || \
          printf '\ninclude "/etc/bind/rndc.key";\n' >> /etc/bind/named.conf
        grep -qr 'controls' /etc/bind/ 2>/dev/null || \
          printf '\ncontrols {\n    inet 0.0.0.0 port 953 allow { any; } keys { "rndc-key"; };\n};\n' >> /etc/bind/named.conf
        exec docker-entrypoint.sh named -g -u bind
    volumes:
      - bind-primary-config:/etc/bind
      - bind-primary-zones:/var/cache/bind
    ports:
      - "5352:53/udp"
      - "5352:53/tcp"

  # ─── Primary dnsapi ──────────────────────────────────────────────────────────
  dnsapi-primary:
    build: .
    restart: unless-stopped
    depends_on:
      - bind-primary
    environment:
      MODE: primary
      API_TOKEN: abcd
      PRIMARY_NAME_SERVER: ns1.example.com
      NAME_SERVERS: ns1.example.com,ns2.example.com
      # Set explicit IPs to skip DNS resolution of the FQDNs above.
      # These IPs appear in zone files (allow-transfer / masters directives).
      PRIMARY_NAME_SERVER_IP: "1.2.3.4"
      SECONDARY_NAME_SERVER_IPS: "5.6.7.8"
      SECONDARY_INSTANCES: http://dnsapi-secondary:1323
      ABUSE_EMAIL: admin@example.com
      DATABASE_PATH: /data/dnsapi.sqlite
      # rndc connects to bind-primary over the shared Docker network
      BIND_RELOAD_COMMAND: rndc -s bind-primary -p 953 reload
      BIND_REFRESH_COMMAND: rndc -s bind-primary -p 953 refresh
    volumes:
      - dnsapi-data:/data
      - bind-primary-config:/etc/bind   # shared rndc.key
      - bind-primary-zones:/var/cache/bind
    ports:
      - "1323:1323"

  # ─── Secondary bind9 ─────────────────────────────────────────────────────────
  bind-secondary:
    image: ubuntu/bind9:latest
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        grep -q 'rndc.key' /etc/bind/named.conf 2>/dev/null || \
          printf '\ninclude "/etc/bind/rndc.key";\n' >> /etc/bind/named.conf
        grep -qr 'controls' /etc/bind/ 2>/dev/null || \
          printf '\ncontrols {\n    inet 0.0.0.0 port 953 allow { any; } keys { "rndc-key"; };\n};\n' >> /etc/bind/named.conf
        exec docker-entrypoint.sh named -g -u bind
    volumes:
      - bind-secondary-config:/etc/bind
      - bind-secondary-zones:/var/cache/bind
    ports:
      - "5354:53/udp"
      - "5354:53/tcp"

  # ─── Secondary dnsapi ────────────────────────────────────────────────────────
  dnsapi-secondary:
    build: .
    restart: unless-stopped
    depends_on:
      - bind-secondary
    environment:
      MODE: secondary
      API_TOKEN: abcd          # Must match dnsapi-primary
      # rndc connects to bind-secondary over the shared Docker network
      BIND_RELOAD_COMMAND: rndc -s bind-secondary -p 953 reload
      BIND_REFRESH_COMMAND: rndc -s bind-secondary -p 953 refresh
    volumes:
      - bind-secondary-config:/etc/bind   # shared rndc.key
      - bind-secondary-zones:/var/cache/bind
    ports:
      - "1324:1323"

volumes:
  bind-primary-config:
  bind-primary-zones:
  dnsapi-data:
  bind-secondary-config:
  bind-secondary-zones:
